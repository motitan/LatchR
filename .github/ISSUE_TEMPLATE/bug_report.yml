name: Bug report
description: Report a reproducible bug in Tagger
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include clear reproduction steps.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, from app launch to failure
      placeholder: |
        1. Open project ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: e.g. 0.2.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.7

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste errors from terminal/devtools and attach screenshots if useful
